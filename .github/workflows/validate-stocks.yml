name: Validate Stock Symbols

on:
  pull_request:
    paths:
      - "config/stocks.yaml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install pyyaml akshare requests

      - name: Validate stock symbols
        run: |
          python3 scripts/validate_stocks.py
