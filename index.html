<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot US Stocks - 热门美股行情</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
    <header>
        <div class="container">
            <h1>热门美股行情</h1>
            <p class="subtitle">每日行情分析与走势图表</p>
            <p class="updated-time" id="updatedTime"></p>
        </div>
    </header>

    <main class="container">
        <!-- Filter Bar -->
        <section class="filter-bar">
            <div class="filter-group" id="categoryFilters">
                <button class="filter-btn active" data-category="all">全部</button>
                <button class="filter-btn" data-category="mag7">七巨头</button>
                <button class="filter-btn" data-category="semi">半导体</button>
                <button class="filter-btn" data-category="software">软件云</button>
                <button class="filter-btn" data-category="internet">互联网</button>
                <button class="filter-btn" data-category="fintech">金融科技</button>
                <button class="filter-btn" data-category="cn">中概股</button>
            </div>
            <div class="filter-group" id="sortButtons">
                <button class="sort-btn" data-sort="top">涨幅榜</button>
                <button class="sort-btn" data-sort="bottom">跌幅榜</button>
                <span class="filter-sep"></span>
                <button class="sort-btn" data-sort="up">上涨</button>
                <button class="sort-btn" data-sort="down">下跌</button>
            </div>
        </section>

        <!-- Market Stats Bar -->
        <section class="stats-bar" id="statsBar">
            <div class="stats-content" id="statsContent"></div>
            <div class="sparkline-toggle" id="sparklineToggle">
                <span class="sparkline-toggle-label">走势</span>
                <button class="spark-btn active" data-spark="intraday">分时</button>
                <button class="spark-btn" data-spark="daily">日线</button>
                <button class="spark-btn" data-spark="monthly">月线</button>
            </div>
        </section>

        <!-- Market Info Bar -->
        <section class="info-bar" id="infoBar">
            <div class="info-summary" id="infoSummary"></div>
            <div class="info-news">
                <span class="news-label">快讯</span>
                <div class="news-scroll-wrap">
                    <div class="news-scroll" id="newsScroll"></div>
                </div>
            </div>
        </section>

        <!-- Two-column layout: US left, China right -->
        <section class="section two-col" id="twoColSection">
            <div class="col col-us">
                <h2 class="section-title">美股 <span class="market-date" id="marketDate"></span></h2>
                <div class="stock-grid" id="usStockGrid"></div>
            </div>
            <div class="col col-cn">
                <h2 class="section-title">中概股</h2>
                <div class="stock-grid" id="cnStockGrid"></div>
            </div>
        </section>

        <!-- Ranked View (hidden by default) -->
        <section class="ranked-section" id="rankedSection" style="display:none"></section>

        <!-- Chart Section — bottom -->
        <section class="section chart-section">
            <div class="chart-header">
                <div class="chart-title-group">
                    <button class="back-to-indices" id="backToIndices" onclick="window.__showIndices()" title="Back to indices overview">&larr;</button>
                    <span class="chart-stock-symbol" id="chartStockSymbol"></span>
                    <span id="chartStockName">美股三大指数</span>
                </div>
                <div class="chart-details-inline" id="chartDetails"></div>
                <div class="time-range-buttons" id="timeRangeButtons">
                    <button class="range-btn" data-range="1D">分时</button>
                    <button class="range-btn active" data-range="D5">日线</button>
                    <button class="range-btn" data-range="1W">周线</button>
                    <button class="range-btn" data-range="1M">月线</button>
                    <button class="range-btn" data-range="3M">季线</button>
                    <button class="range-btn" data-range="6M">半年</button>
                    <button class="range-btn" data-range="1Y">年线</button>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="stockChart"></canvas>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>数据来源: 新浪财经 | 每日更新</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
