<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot US Stocks - 热门美股行情</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
    <header>
        <div class="container">
            <h1>Hot US Stocks</h1>
            <p class="subtitle">热门美股行情分析</p>
            <p class="updated-time" id="updatedTime"></p>
        </div>
    </header>

    <main class="container">
        <!-- Market Overview Section -->
        <section class="section">
            <h2 class="section-title">Market Overview <span class="market-date" id="marketDate"></span></h2>
            <div class="stock-grid" id="stockGrid">
                <!-- Stock cards will be inserted here -->
            </div>
        </section>

        <!-- Chart Section -->
        <section class="section chart-section">
            <div class="chart-header">
                <h2 class="section-title">
                    <span id="chartStockName">Select a stock</span>
                    <span class="chart-stock-symbol" id="chartStockSymbol"></span>
                </h2>
                <div class="time-range-buttons" id="timeRangeButtons">
                    <button class="range-btn" data-range="1W">1W</button>
                    <button class="range-btn" data-range="1M">1M</button>
                    <button class="range-btn active" data-range="3M">3M</button>
                    <button class="range-btn" data-range="6M">6M</button>
                    <button class="range-btn" data-range="1Y">1Y</button>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="stockChart"></canvas>
            </div>
            <div class="chart-details" id="chartDetails">
                <!-- Yesterday's detailed metrics -->
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>Data source: Yahoo Finance | Updated daily</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
